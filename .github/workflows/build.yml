name: Build TurnoQuests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "release/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile
        run: mvn --batch-mode --no-transfer-progress package

      - name: Run 1000+ checks
        run: java -cp target/classes:target/test-classes pro.turnoworld.quests.TestRunner .

      - name: Prepare downloads
        run: |
          mkdir -p release
          cp target/turnoquests-1.2.0.jar release/TurnoQuests-1.2.0.jar
          zip -j release/TurnoQuests-1.2.0-package.zip release/TurnoQuests-1.2.0.jar README.md TEST-REPORT.md
          sha256sum release/TurnoQuests-1.2.0.jar release/TurnoQuests-1.2.0-package.zip > release/SHA256.txt

      - name: Publish downloads
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release
          git diff --cached --quiet || git commit -m "Build TurnoQuests 1.2.0 [skip ci]"
          git push
