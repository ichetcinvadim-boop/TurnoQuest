name: Build TurnoQuests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "release/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile
        run: mvn --batch-mode --no-transfer-progress package

      - name: Run 1000+ checks
        run: java -cp target/classes:target/test-classes pro.turnoworld.quests.TestRunner .

      - name: Prepare downloads
        run: |
          mkdir -p release
          cp target/turnoquests-1.2.1.jar release/TurnoQuests-1.2.1.jar
          zip -j release/TurnoQuests-1.2.1-package.zip release/TurnoQuests-1.2.1.jar README.md TEST-REPORT.md
          sha256sum release/TurnoQuests-1.2.1.jar release/TurnoQuests-1.2.1-package.zip > release/SHA256-1.2.1.txt

      - name: Upload verified downloads
        uses: actions/upload-artifact@v4
        with:
          name: TurnoQuests-1.2.1
          path: |
            release/TurnoQuests-1.2.1.jar
            release/TurnoQuests-1.2.1-package.zip
            release/SHA256-1.2.1.txt
          if-no-files-found: error
