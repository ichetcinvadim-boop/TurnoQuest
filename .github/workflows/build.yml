name: Build TurnoQuests

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile against real Paper API
        run: mvn --batch-mode --no-transfer-progress test-compile dependency:build-classpath -Dmdep.outputFile=target/classpath.txt

      - name: Run 1000+ checks
        run: java -cp target/classes:target/test-classes pro.turnoworld.quests.TestRunner .

      - name: Build plugin
        run: mvn --batch-mode --no-transfer-progress package -DskipTests

      - name: Verify runtime ABI
        run: |
          CP="$(cat target/classpath.txt)"
          mkdir -p target/abi
          javac -cp "$CP" -d target/abi build-support/AbiVerifier.java
          java -cp "target/abi:$CP" AbiVerifier target/turnoquests-1.5.1.jar $(tr ':' ' ' < target/classpath.txt)

      - name: Prepare downloads
        run: |
          mkdir -p release
          cp target/turnoquests-1.5.1.jar release/TurnoQuests-1.5.1.jar
          zip -j release/TurnoQuests-1.5.1-package.zip release/TurnoQuests-1.5.1.jar README.md TEST-REPORT.md
          zip -qr release/TurnoQuests-1.5.1-source.zip src pom.xml build-support .github README.md TEST-REPORT.md
          sha256sum release/TurnoQuests-1.5.1.jar release/TurnoQuests-1.5.1-package.zip release/TurnoQuests-1.5.1-source.zip > release/SHA256-1.5.1.txt

      - name: Upload verified downloads
        uses: actions/upload-artifact@v4
        with:
          name: TurnoQuests-1.5.1
          path: |
            release/TurnoQuests-1.5.1.jar
            release/TurnoQuests-1.5.1-package.zip
            release/TurnoQuests-1.5.1-source.zip
            release/SHA256-1.5.1.txt
          if-no-files-found: error
