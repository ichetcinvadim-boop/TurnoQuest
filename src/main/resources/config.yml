language: ru
timezone: Europe/Moscow
autosave-seconds: 60
backup-on-start: true
backup-interval-hours: 12

economy:
  enabled: true
  # Значения money в quests.yml уже являются итоговыми. Можно изменить все награды одним множителем.
  quest-reward-multiplier: 1.0
  # Без Vault деньги останутся в очереди и будут выданы после появления экономики.

playerpoints:
  # Осколки выдаются напрямую через официальный API по UUID, в том числе офлайн-игрокам.
  enabled: true

gui:
  title: "&0Квесты TurnoWorld"
  current-glow: true
  filler: BLACK_STAINED_GLASS_PANE

tracker:
  enabled: true
  # Трекер появляется только после подходящего действия и сам исчезает.
  interval-ticks: 10
  active-seconds: 5
  reward-seconds: 10
  suppress-in-pvp: true
  pvp-placeholder: "%combatlogx_tag_count%"
  suppress-in-events: true
  event-placeholder: "%turnoevents_joined%"

anti-exploit:
  ignore-creative: true
  ignore-player-placed-blocks: true
  ignore-spawner-and-egg-mobs: true
npc:
  enabled: true
  entity-type: VILLAGER
  name: "&6&lКвестовый проводник"
  glowing: true
  # Координаты автоматически заполняются командой /tq npc set.
  world: ""
  x: 0.0
  y: 0.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0

milestones:
  broadcast-chapters: true
  title-chapters: true

global-weekly:
  enabled: true
  required: 25000
  reward-money: 25000

postgame:
  enabled: true
  prestige-money: 150000
